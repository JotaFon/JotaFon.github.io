<section id="languages" class="section">
  <div class="container">
    <div class="section-header" data-aos="fade-up">
      <h2 class="section-title" data-i18n="languages.title">LANGUAGES</h2>
    </div>

    <div class="languages-grid">
      <div class="language-card reveal-card">
        <div class="language-flag" data-icon="flagBrazil"></div>
        <h3 class="language-name" data-i18n="languages.portuguese">
          Portuguese
        </h3>
        <span class="language-level native" data-i18n="languages.native"
          >Native</span
        >
      </div>

      <div class="language-card reveal-card">
        <div class="language-flag" data-icon="flagUSA"></div>
        <h3 class="language-name" data-i18n="languages.english">English</h3>
        <span
          class="language-level intermediate"
          data-i18n="languages.intermediate"
          >Intermediate</span
        >
      </div>

      <div class="language-card reveal-card">
        <div class="language-flag" data-icon="flagGermany"></div>
        <h3 class="language-name" data-i18n="languages.german">German</h3>
        <span class="language-level learning" data-i18n="languages.learning"
          >A2 level</span
        >
      </div>
    </div>
  </div>
</section>

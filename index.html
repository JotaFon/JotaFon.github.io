<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>João Victor Fonseca - Full Stack Developer</title>

    <meta
      name="description"
      content="João Victor Fonseca - Full Stack Developer working with TypeScript, AdonisJS, React, Redux, Vite, PostgreSQL and React Native."
    />
    <meta
      name="keywords"
      content="developer, full stack, react, javascript, front-end, back-end, ux ui design, creativity"
    />
    <meta name="author" content="João Victor Fonseca" />
    <meta name="theme-color" content="#0b0f14" />

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

    <script src="js/icons.js"></script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/sections-loader.js"></script>
    <script src="js/main.js"></script>

    <script>
      SectionsLoader.init("app");

      document.addEventListener("sectionsLoaded", () => {
        AOS.init({
          duration: 1000,
          once: true,
          offset: 100,
        });

        if (document.getElementById("particles-js")) {
          particlesJS("particles-js", particlesConfig);
        }

        if (typeof initIcons === "function") {
          initIcons();
        }

        if (typeof initLanguage === "function") initLanguage();
        if (typeof initSmoothScroll === "function") initSmoothScroll();
        if (typeof initParallax === "function") initParallax();
        if (typeof initRipple === "function") initRipple();
        if (typeof initSkillsAnimation === "function") initSkillsAnimation();
        if (typeof initTimelineAnimation === "function")
          initTimelineAnimation();
        if (typeof initBackgroundScroll === "function") initBackgroundScroll();
        if (typeof initKonamiCode === "function") initKonamiCode();
        if (typeof initContactCards === "function") initContactCards();

        window.addEventListener("scroll", () => {
          const navbar = document.getElementById("navbar");

          if (navbar) {
            navbar.classList.toggle("scrolled", window.pageYOffset > 50);
          }
        });
      });
    </script>
  </body>
</html>
